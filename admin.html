<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Upload | Praveen Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      box-sizing:border-box;
      font-family:Poppins, Arial, sans-serif;
    }

    body{
      margin:0;
      background:#0f0f0f;
      color:#fff;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .upload-box{
      width:100%;
      max-width:420px;
      background:#171717;
      padding:24px;
      border-radius:18px;
      border:1px solid #292929;
      box-shadow:0 10px 30px rgba(0,0,0,.4);
    }

    h2{
      text-align:center;
      color:#ff2c2c;
      margin-bottom:20px;
    }

    label{
      font-size:14px;
      margin-top:12px;
      display:block;
      color:#ddd;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border:none;
      border-radius:12px;
      background:#242424;
      color:#fff;
    }

    button{
      width:100%;
      margin-top:20px;
      padding:13px;
      border:none;
      border-radius:30px;
      background:#ff2c2c;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }

    #msg{
      margin-top:15px;
      text-align:center;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="upload-box">
    <h2>🎵 Upload New Song</h2>

    <form id="uploadForm">

      <label>Song Name</label>
      <input type="text" id="name" required>

      <label>Price</label>
      <input type="number" id="price" required>

      <label>Cover Image</label>
      <input type="file" id="img" accept="image/*" required>

      <label>Audio File</label>
      <input type="file" id="audio" accept="audio/*" required>

      <button type="submit">Upload Song</button>

    </form>

    <p id="msg"></p>
  </div>

<script>
const API = "https://praveen-music-store.onrender.com";

const form = document.getElementById("uploadForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  msg.style.color = "#fff";
  msg.textContent = "Uploading... please wait";

  const formData = new FormData();

  formData.append("name", document.getElementById("name").value);
  formData.append("price", document.getElementById("price").value);
  formData.append("img", document.getElementById("img").files[0]);
  formData.append("audio", document.getElementById("audio").files[0]);

  try {
    const res = await fetch(`${API}/api/upload`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (data.success) {
      msg.style.color = "#25D366";
      msg.textContent = "✅ Song uploaded successfully!";
      form.reset();
    } else {
      msg.style.color = "red";
      msg.textContent = "❌ Upload failed";
    }

  } catch (err) {
    msg.style.color = "red";
    msg.textContent = "❌ Server error";
  }
});
</script>

</body>
</html>
