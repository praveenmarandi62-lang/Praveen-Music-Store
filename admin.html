<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Upload | Praveen Music</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
  box-sizing:border-box;
  font-family:Poppins,Arial,sans-serif
}

body{
  margin:0;
  background:#0f0f0f;
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.upload-box{
  width:100%;
  max-width:420px;
  background:#171717;
  padding:24px;
  border-radius:18px;
  border:1px solid #292929;
}

h2{
  text-align:center;
  color:#ff2c2c;
}

label{
  font-size:14px;
  margin-top:12px;
  display:block;
  color:#ddd;
}

input,
select{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:#242424;
  color:#fff;
}

button{
  width:100%;
  margin-top:20px;
  padding:13px;
  border:none;
  border-radius:30px;
  background:#ff2c2c;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#msg{
  text-align:center;
  margin-top:15px;
}

.manage-box{
  margin-bottom:25px;
  padding-bottom:20px;
  border-bottom:1px solid #333;
}

#managerPanel{
  display:none;
  margin-top:15px;
}

#editBox{
  display:none;
  margin-top:15px;
}

.progress-box{
  width:100%;
  height:10px;
  background:#222;
  border-radius:30px;
  overflow:hidden;
  margin-top:15px;
}

#progressBar{
  width:0%;
  height:100%;
  background:#25D366;
}

#progressText{
  text-align:center;
  font-size:13px;
  margin-top:8px;
  color:#aaa;
}

</style>
</head>

<body>

<script>

const adminPassword =
prompt("Enter Admin Password");

if(!adminPassword){

  window.location.href =
  "index.html";

}

</script>

<div class="upload-box">

  <!-- UPDATE SONG -->

  <div class="manage-box">

    <h2>🛠 Update Song</h2>

    <button id="openManager">
      Select Song To Update
    </button>

    <div id="managerPanel">

      <select id="songSelect">
        <option value="">Select Song</option>
      </select>

      <div id="editBox">

        <label>Song Name</label>
        <input type="text" id="editName">

        <label>Price</label>
        <input type="number" id="editPrice">

        <label>Category</label>

        <select id="editCategory">

          <option value="Sad">Sad</option>
          <option value="Love">Love</option>
          <option value="BGM">BGM</option>
          <option value="LoFi">LoFi</option>
          <option value="Vlog">Vlog</option>

        </select>

        <button id="saveBtn">
          Update Song
        </button>

        <button
          id="deleteBtn"
          style="background:#444;margin-top:10px;"
        >
          Delete Song
        </button>

      </div>

    </div>

  </div>

  <!-- UPLOAD NEW SONG -->

  <h2>🎵 Upload New Song</h2>

  <form id="uploadForm">

    <label>Song Name</label>
    <input type="text" id="name" required>

    <label>Price</label>
    <input type="number" id="price" required>

    <label>Category</label>

    <select id="category" required>

      <option value="Sad">Sad</option>
      <option value="Love">Love</option>
      <option value="BGM">BGM</option>
      <option value="LoFi">LoFi</option>
      <option value="Vlog">Vlog</option>

    </select>

    <label>Cover Image</label>
    <input
      type="file"
      id="img"
      accept="image/*"
      required
    >

    <label>Audio File</label>
    <input
      type="file"
      id="audio"
      accept="audio/*"
      required
    >

    <button type="submit">
      Upload Song
    </button>

    <div class="progress-box">
      <div id="progressBar"></div>
    </div>

    <p id="progressText">0%</p>

  </form>

  <p id="msg"></p>

</div>

<script>

const API =
"https://praveen-music-store.onrender.com";

const form =
document.getElementById("uploadForm");

const msg =
document.getElementById("msg");

const progressBar =
document.getElementById("progressBar");

const progressText =
document.getElementById("progressText");

const openManager =
document.getElementById("openManager");

const managerPanel =
document.getElementById("managerPanel");

const songSelect =
document.getElementById("songSelect");

const editBox =
document.getElementById("editBox");

let allSongs = [];

let currentSongId = null;

/* TOGGLE UPDATE PANEL */

openManager.addEventListener("click",()=>{

  if(managerPanel.style.display==="block"){

    managerPanel.style.display="none";

  }else{

    managerPanel.style.display="block";

  }

});

/* UPLOAD SONG */

form.addEventListener("submit",(e)=>{

  e.preventDefault();

  msg.style.color="#fff";

  msg.textContent=
  "Uploading... please wait";

  progressBar.style.width="0%";

  progressText.textContent="0%";

  const formData = new FormData();

  formData.append(
    "name",
    document.getElementById("name").value
  );

  formData.append(
    "price",
    document.getElementById("price").value
  );

  formData.append(
    "category",
    document.getElementById("category").value
  );

  formData.append(
    "img",
    document.getElementById("img").files[0]
  );

  formData.append(
    "audio",
    document.getElementById("audio").files[0]
  );

  const xhr = new XMLHttpRequest();

  xhr.open(
    "POST",
    `${API}/api/upload`
  );

  xhr.setRequestHeader(
    "admin-password",
    adminPassword
  );

  xhr.upload.onprogress = (event)=>{

    if(event.lengthComputable){

      const percent =
      Math.round(
        (event.loaded/event.total)*100
      );

      progressBar.style.width =
      percent + "%";

      progressText.textContent =
      percent + "%";

    }

  };

  xhr.onload = ()=>{

    try{

      const data =
      JSON.parse(xhr.responseText);

      if(data.success){

        msg.style.color="#25D366";

        msg.textContent =
        "✅ Song uploaded successfully!";

        form.reset();

        progressBar.style.width =
        "100%";

        progressText.textContent =
        "Upload Complete";

        loadAdminSongs();

      }else{

        msg.style.color="red";

        msg.textContent=
        "❌ Upload failed";

      }

    }catch(err){

      msg.style.color="red";

      msg.textContent=
      "❌ Upload failed";

    }

  };

  xhr.onerror = ()=>{

    msg.style.color="red";

    msg.textContent=
    "❌ Server error";

  };

  xhr.send(formData);

});

/* LOAD SONGS */

async function loadAdminSongs(){

  try{

    const res =
    await fetch(`${API}/api/songs`);

    const songs =
    await res.json();

    allSongs = songs;

    songSelect.innerHTML =
    `<option value="">Select Song</option>`;

    songs.forEach(song=>{

      const option =
      document.createElement("option");

      option.value = song._id;

      option.textContent =
      song.name;

      songSelect.appendChild(option);

    });

  }catch(err){

    alert("Songs load failed");

  }

}

/* SELECT SONG */

songSelect.addEventListener("change",()=>{

  const id =
  songSelect.value;

  const song =
  allSongs.find(s=>s._id===id);

  if(!song){

    editBox.style.display="none";

    return;

  }

  currentSongId = id;

  editBox.style.display="block";

  document.getElementById("editName").value =
  song.name;

  document.getElementById("editPrice").value =
  song.price;

  document.getElementById("editCategory").value =
  song.category || "Sad";

});

/* UPDATE SONG */

document.getElementById("saveBtn")
.addEventListener("click",async()=>{

  const name =
  document.getElementById("editName").value;

  const price =
  document.getElementById("editPrice").value;

  const category =
  document.getElementById("editCategory").value;

  const res = await fetch(

    `${API}/api/songs/${currentSongId}`,

    {

      method:"PUT",

      headers:{
        "Content-Type":"application/json",
        "admin-password":adminPassword
      },

      body:JSON.stringify({
        name,
        price,
        category
      })

    }

  );

  const data = await res.json();

  if(data.success){

    alert("✅ Song Updated");

    loadAdminSongs();

  }else{

    alert("❌ Update Failed");

  }

});

/* DELETE SONG */

document.getElementById("deleteBtn")
.addEventListener("click",async()=>{

  if(!confirm("Delete this song?"))
  return;

  const res = await fetch(

    `${API}/api/songs/${currentSongId}`,

    {

      method:"DELETE",

      headers:{
        "admin-password":adminPassword
      }

    }

  );

  const data = await res.json();

  if(data.success){

    alert("✅ Song Deleted");

    editBox.style.display="none";

    loadAdminSongs();

  }else{

    alert("❌ Delete Failed");

  }

});

loadAdminSongs();

</script>

</body>
</html>
