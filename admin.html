<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Upload | Praveen Music</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:Poppins,Arial,sans-serif}
body{
  margin:0;background:#0f0f0f;color:#fff;min-height:100vh;
  display:flex;justify-content:center;align-items:center;padding:20px;
}
.upload-box{
  width:100%;max-width:420px;background:#171717;padding:24px;
  border-radius:18px;border:1px solid #292929;
}
h2{text-align:center;color:#ff2c2c}
label{font-size:14px;margin-top:12px;display:block;color:#ddd}
input,select{
  width:100%;padding:12px;margin-top:6px;border:none;
  border-radius:12px;background:#242424;color:#fff;
}
button{
  width:100%;margin-top:20px;padding:13px;border:none;
  border-radius:30px;background:#ff2c2c;color:#fff;font-weight:700;
}
#msg{text-align:center;margin-top:15px}
</style>
</head>

<body>

<script>
const adminPassword =
prompt("Enter Admin Password");

if(!adminPassword){

  window.location.href =
  "index.html";

}
</script>

<div class="upload-box">
  <div class="manage-box">
  <h2>🛠 Manage Songs</h2>
  <div id="adminSongList"></div>
</div>
  <h2>🎵 Upload New Song</h2>

  <form id="uploadForm">
    <label>Song Name</label>
    <input type="text" id="name" required>

    <label>Price</label>
    <input type="number" id="price" required>

    <label>Category</label>
    <select id="category" required>
      <option value="Sad">Sad</option>
      <option value="Love">Love</option>
      <option value="DJ Mix">DJ Mix</option>
      <option value="LoFi">LoFi</option>
      <option value="Dance">Dance</option>
    </select>

    <label>Cover Image</label>
    <input type="file" id="img" accept="image/*" required>

    <label>Audio File</label>
    <input type="file" id="audio" accept="audio/*" required>

    <button type="submit">Upload Song</button>
    <div class="progress-box">
    <div id="progressBar"></div>
    </div>

    <p id="progressText">0%</p>
  </form>

  <p id="msg"></p>
</div>

<script>
const API = "https://praveen-music-store.onrender.com";
const form = document.getElementById("uploadForm");
const msg = document.getElementById("msg");const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const adminSongList = document.getElementById("adminSongList");

/* Upload Song */
form.addEventListener("submit", (e) => {

  e.preventDefault();

  msg.style.color = "#fff";
  msg.textContent = "Uploading... please wait";

  progressBar.style.width = "0%";
  progressText.textContent = "0%";

  const formData = new FormData();

  formData.append(
    "name",
    document.getElementById("name").value
  );

  formData.append(
    "price",
    document.getElementById("price").value
  );

  formData.append(
    "category",
    document.getElementById("category").value
  );

  formData.append(
    "img",
    document.getElementById("img").files[0]
  );

  formData.append(
    "audio",
    document.getElementById("audio").files[0]
  );

  const xhr = new XMLHttpRequest();

  xhr.open(
    "POST",
    `${API}/api/upload`
  );

  xhr.setRequestHeader(
  "admin-password",
  adminPassword
);

  /* Upload Progress */

  xhr.upload.onprogress = (event) => {

    if (event.lengthComputable) {

      const percent = Math.round(

        (event.loaded / event.total) * 100

      );

      progressBar.style.width =
      percent + "%";

      progressText.textContent =
      percent + "%";

    }

  };

  /* Upload Complete */

  xhr.onload = () => {

    try {

      const data =
      JSON.parse(xhr.responseText);

      if (data.success) {

        msg.style.color = "#25D366";

        msg.textContent =
        "✅ Song uploaded successfully!";

        form.reset();

        progressBar.style.width =
        "100%";

        progressText.textContent =
        "Upload Complete";

        loadAdminSongs();

      } else {

        msg.style.color = "red";

        msg.textContent =
        "❌ Upload failed";

      }

    } catch (err) {

      msg.style.color = "red";

      msg.textContent =
      "❌ Upload failed";

    }

  };

  /* Upload Error */

  xhr.onerror = () => {

    msg.style.color = "red";

    msg.textContent =
    "❌ Server error";

  };

  xhr.send(formData);

});

async function loadAdminSongs(){
  adminSongList.innerHTML = "<p>Loading songs...</p>";

  try{
    const res = await fetch(`${API}/api/songs`);
    const songs = await res.json();

    adminSongList.innerHTML = "";

    songs.forEach(song => {
      const div = document.createElement("div");
      div.className = "song-item";

      div.innerHTML = `
        <h3>${song.name}</h3>
        <p>₹${song.price} | ${song.category || "No Category"}</p>

        <input type="text" value="${song.name}" id="name-${song._id}">
        <input type="number" value="${song.price}" id="price-${song._id}">

        <select id="category-${song._id}">
          <option value="Sad" ${song.category === "Sad" ? "selected" : ""}>Sad</option>
          <option value="Love" ${song.category === "Love" ? "selected" : ""}>Love</option>
          <option value="DJ Mix" ${song.category === "DJ Mix" ? "selected" : ""}>DJ Mix</option>
          <option value="LoFi" ${song.category === "LoFi" ? "selected" : ""}>LoFi</option>
          <option value="Dance" ${song.category === "Dance" ? "selected" : ""}>Dance</option>
        </select>

        <button onclick="updateSong('${song._id}')">Update</button>
        <button onclick="deleteSong('${song._id}')">Delete</button>
      `;

      adminSongList.appendChild(div);
    });

  }catch(err){
    adminSongList.innerHTML = "<p style='color:red'>Songs load failed</p>";
  }
}

async function updateSong(id){
  const name = document.getElementById(`name-${id}`).value;
  const price = document.getElementById(`price-${id}`).value;
  const category = document.getElementById(`category-${id}`).value;

  const res = await fetch(`${API}/api/songs/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "admin-password": adminPassword
    },
    body: JSON.stringify({ name, price, category })
  });

  const data = await res.json();

  if(data.success){
    alert("✅ Song updated");
    loadAdminSongs();
  }else{
    alert("❌ Update failed");
  }
}

async function deleteSong(id){
  if(!confirm("Delete this song?")) return;

  const res = await fetch(`${API}/api/songs/${id}`, {
    method: "DELETE",
    headers: {
      "admin-password": adminPassword
    }
  });

  const data = await res.json();

  if(data.success){
    alert("✅ Song deleted");
    loadAdminSongs();
  }else{
    alert("❌ Delete failed");
  }
}

loadAdminSongs();
</script>

</body>
</html>
