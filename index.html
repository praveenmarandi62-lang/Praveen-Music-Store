<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praveen AI Music Store | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-red: #e72c30;
            --notebook-bg: #fff; 
            --line-color: #e0e0e0; 
            --margin-line: #ff8585; 
            --gaana-red: #e72c30;
            --whatsapp-green: #25D366;
            --gmail-color: #EA4335;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background-color: var(--sidebar-red); 
            display: flex; 
            align-items: flex-start;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px; 
            background: var(--sidebar-red); 
            padding: 20px; 
            color: white; 
            display: flex; 
            flex-direction: column;
            box-sizing: border-box;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .profile-area { text-align: center; margin-bottom: 25px; }
        .profile-pic {
            width: 100px; height: 100px; 
            border-radius: 50%; border: 3px solid white;
            object-fit: cover; object-position: top;
            background: white; margin-bottom: 15px;
        }

        .brand-name {
            color: #fff; font-size: 18px; font-weight: 800;
            text-align: center; text-transform: uppercase;
            letter-spacing: 1.5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px; 
            color: white; text-decoration: none; border-radius: 8px;
            margin-bottom: 5px; font-weight: 500; font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* --- TERMS SECTION --- */
        .terms-container { margin-top: 20px; width: 100%; }
        .terms-title-btn {
            background: #000; border: none; color: white; width: 100%;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; font-weight: bold; cursor: pointer;
            border-radius: 5px 5px 0 0; text-transform: uppercase; font-size: 10px;
        }
        .terms-sheet {
            max-height: 0; overflow-y: auto;
            background: #fdfdfd; color: #333;
            transition: max-height 0.6s ease-in-out;
            border-radius: 0 0 5px 5px;
        }
        .terms-container.active .terms-sheet { max-height: 400px; border: 1px solid #ddd; }
        .terms-content { padding: 15px; font-size: 11px; line-height: 1.5; }

        .help-support {
            margin-top: 20px; padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 120px;
        }
        .support-btn {
            display: flex; align-items: center; gap: 10px;
            background: white; border-radius: 6px; padding: 8px 12px;
            margin-bottom: 10px; text-decoration: none; font-size: 12px;
            font-weight: 600;
        }
        .support-btn.whatsapp { color: var(--whatsapp-green); }
        .support-btn.gmail { color: var(--gmail-color); }

        /* --- MAIN WRAPPER --- */
        .main-wrapper {
            flex-grow: 1;
            margin: 40px 40px 140px 20px;
            background: var(--notebook-bg);
            border-radius: 12px; min-height: 100vh;
            position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .main-wrapper::before {
            content: ''; position: absolute; left: 50px; top: 0; bottom: 0;
            width: 2px; background: var(--margin-line); z-index: 1;
        }

        .header-section {
            background: #fcfcfc; padding: 30px 60px;
            border-bottom: 3px solid #000; width: 100%; box-sizing: border-box;
        }
        .header-section h1 { font-size: 32px; margin: 0; text-transform: uppercase; }
        .header-section p { font-size: 14px; color: var(--gaana-red); font-weight: 600; }

        /* --- MOBILE OPTIMIZED TRACK LIST --- */
        .track-list { width: 100%; display: flex; flex-direction: column; position: relative; z-index: 2; padding-left: 50px; box-sizing: border-box; }
        
        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 10px;
            border-bottom: 1px solid var(--line-color);
            width: 100%;
            box-sizing: border-box;
            gap: 10px;
        }

        .track-no { font-weight: bold; color: #bbb; font-size: 14px; width: 25px; }
        
        .track-main { display: flex; align-items: center; gap: 12px; flex-grow: 1; min-width: 0; }
        .play-icon { font-size: 24px; color: var(--gaana-red); cursor: pointer; flex-shrink: 0; }
        .track-img { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        
        .track-info { overflow: hidden; }
        .track-name { font-weight: 700; color: #1a1a1a; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-sub { font-size: 11px; color: #888; }

        .buy-badge.locked {
            background: #999 !important;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            cursor: not-allowed;
            border: none;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 65px;
        }

        /* --- PLAYER BAR --- */
        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #121212; padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 9999; color: white; box-sizing: border-box;
            border-top: 3px solid var(--gaana-red);
        }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-wrapper { margin: 10px; margin-bottom: 140px; }
            .header-section { padding: 20px 60px; }
            .header-section h1 { font-size: 24px; }
            .main-wrapper::before { left: 45px; }
            .track-list { padding-left: 45px; }
            audio { width: 120px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile-area">
            <img src="praveen-photo.jpg" class="profile-pic">
            <div class="brand-name">Praveen AI Music Store</div>
        </div>
        
        <nav>
            <a href="#" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="https://youtube.com/@praveenaimusic" class="nav-link" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
            <a href="https://instagram.com/praveenmarandi7" class="nav-link" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://facebook.com/share/1KAcze5JrC/" class="nav-link" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
        </nav>

        <div class="terms-container" id="termsBox">
            <button class="terms-title-btn" onclick="toggleTerms()">
                📜 License Agreement <i class="fas fa-chevron-down"></i>
            </button>
            <div class="terms-sheet">
                <div class="terms-content">
                    <h5>1. Ownership</h5><p>AI generated via Suno AI.</p>
                    <h5>2. Usage Rights</h5><p>Allowed for YouTube and Social Media.</p>
                </div>
            </div>
        </div>

        <div class="help-support">
            <a href="https://wa.me/919384522971" class="support-btn whatsapp" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="mailto:praveenmarandi62@gmail.com" class="support-btn gmail"><i class="fas fa-envelope"></i> Gmail Support</a>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="header-section">
            <h1>Music Index</h1>
            <p>Original AI Song and Beat</p>
        </div>
        <div class="track-list" id="trackList"></div>
    </div>

    <div class="player-bar">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="soft1.png" id="current-track-img" style="width:40px; height:40px; border-radius:4px; object-fit:cover;">
            <div class="track-info">
                <div id="current-track-name" style="font-size:12px; font-weight:bold; white-space:nowrap;">Select track</div>
                <div style="font-size:10px; color:#aaa;">Playing</div>
            </div>
        </div>
        <audio id="main-audio" controls onplay="updateIcons(true)" onpause="updateIcons(false)"><source src=""></audio>
        <button class="buy-badge locked"><span>DOWNLOAD</span><span>🔒</span></button>
    </div>

    <script>
    function toggleTerms() { document.getElementById('termsBox').classList.toggle('active'); }

    const myTracks = [
        { name: "Victory 1", img: "steel1.png", audio: "steel1.mp3" },
        { name: "Victory 2", img: "steel2.png", audio: "steel2.mp3" },
        { name: "Soft 1", img: "soft1.png", audio: "soft1.mp3" },
        { name: "Soft 2", img: "soft2.png", audio: "soft2.mp3" },
        { name: "Wind Piano 1", img: "water1.png", audio: "water1.mp3" },
        { name: "Wind Piano 2", img: "water2.png", audio: "water2.mp3" },
        { name: "Rain Glass 1", img: "r1.png", audio: "r1.mp3" },
        { name: "Rain Glass 2", img: "r2.png", audio: "r2.mp3" }
    ];

    const listContainer = document.getElementById('trackList');
    let currentPlayingId = null;

    myTracks.forEach((track, index) => {
        const num = (index + 1) < 10 ? '0' + (index + 1) : (index + 1);
        listContainer.innerHTML += `
        <div class="track-item">
            <div class="track-no">${num}</div>
            <div class="track-main">
                <i class="fas fa-play-circle play-icon" id="icon-${index}" onclick="playTrack(${index})"></i>
                <img src="${track.img}" class="track-img">
                <div class="track-info">
                    <div class="track-name">${track.name}</div>
                    <div class="track-sub">AI Audio</div>
                </div>
            </div>
            <button class="buy-badge locked">BUY ₹29 🔒</button>
        </div>`;
    });

    function playTrack(index) {
        const track = myTracks[index];
        const audioPlayer = document.getElementById('main-audio');
        if (currentPlayingId === index && !audioPlayer.paused) {
            audioPlayer.pause();
        } else {
            if (currentPlayingId !== null) document.getElementById(`icon-${currentPlayingId}`).className = "fas fa-play-circle play-icon";
            audioPlayer.src = track.audio;
            document.getElementById('current-track-img').src = track.img;
            document.getElementById('current-track-name').innerText = track.name;
            audioPlayer.play();
            currentPlayingId = index;
            document.getElementById(`icon-${index}`).className = "fas fa-pause-circle play-icon";
        }
    }

    function updateIcons(isPlaying) {
        if (currentPlayingId !== null) {
            document.getElementById(`icon-${currentPlayingId}`).className = isPlaying ? "fas fa-pause-circle play-icon" : "fas fa-play-circle play-icon";
        }
    }
    </script>
</body>
</html>
